name: tests

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        # Deterministic layer only: prompt.py imports google-genai at module
        # level, so it must be importable, but no test calls the API.
        run: pip install pytest google-genai==2.11.0
      - name: Run tests
        run: pytest tests/ -v
